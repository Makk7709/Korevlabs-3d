services:
  api:
    build: ./services/api
    environment:
      KOREV_ENV: development
      KOREV_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"

  image-to-3d:
    profiles: ["gpu"]
    build: ./services/image-to-3d
    environment:
      KOREV_IMAGE3D_ARTIFACT_ROOT: /data/artifacts
      KOREV_IMAGE3D_WORK_ROOT: /data/work
      KOREV_IMAGE3D_TRIPOSR_PATH: /opt/providers/TripoSR
      KOREV_IMAGE3D_INSTANTMESH_PATH: /opt/providers/InstantMesh
      KOREV_IMAGE3D_MAX_CONCURRENT_JOBS: 1
    ports:
      - "8010:8010"
    volumes:
      - ./data/artifacts:/data/artifacts
      - ./vendor/TripoSR:/opt/providers/TripoSR:ro
      - ./vendor/InstantMesh:/opt/providers/InstantMesh:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  web:
    build: ./apps/web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
