services:
  api:
    build: ./services/api
    environment:
      KOREV_ENV: development
      KOREV_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"

  web:
    build: ./apps/web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

