services:
  api:
    build: ./services/api
    environment:
      KOREV_ENV: development
      KOREV_ALLOWED_ORIGINS: http://localhost:5173
      KOREV_DATA_DIR: /data
    ports:
      - "8000:8000"
    volumes:
      - korev_data:/data

  web:
    build: ./apps/web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  korev_data:
